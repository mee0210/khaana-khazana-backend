version: '3.8'

services:
  # -----------------------------------------------------
  # 1. DATABASE & MESSAGING INFRASTRUCTURE
  # -----------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: khaana_khazana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-jammy
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # -----------------------------------------------------
  # 2. OBSERVABILITY INFRASTRUCTURE
  # -----------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"

  # -----------------------------------------------------
  # 3. MICROSERVICES
  # -----------------------------------------------------
  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "3001:5000"
    environment:
      - PORT=5000
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=khaana_khazana
      - JWT_SECRET=superSecretAccessKey2026!
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy

  restaurant-service:
    build:
      context: ./backend/restaurant-service
    container_name: restaurant-service
    ports:
      - "8001:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=restaurant_db
      - JWT_SECRET=superSecretAccessKey2026!
    depends_on:
      - mongodb

  payment-service:
    build:
      context: ./backend/payment-service
    container_name: payment-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=khaana_khazana
      - JWT_SECRET=superSecretAccessKey2026!
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/khaana_khazana
      - spring.datasource.username=postgres
      - spring.datasource.password=password123
      - JWT_SECRET=superSecretAccessKey2026!
      - KAFKA_URL=kafka:9092
      - PAYMENT_SERVICE_URL=http://payment-service:3002/api/payments
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      payment-service:
        condition: service_started

  notification-service:
    build:
      context: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_GROUP_ID=notification-service
    depends_on:
      - kafka
      - redis
  kong:
    image: kong:alpine
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "off"
    volumes:
      - ./kong:/usr/local/kong/declarative
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - payment-service

volumes:
  postgres_data:
  mongodb_data:
