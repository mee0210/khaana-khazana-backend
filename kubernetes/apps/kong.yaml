apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: user-service
        url: http://user-service:5000
        routes:
          - name: user-routes
            paths:
              - /api/auth
              - /api/users
      - name: restaurant-service
        url: http://restaurant-service:8000
        routes:
          - name: restaurant-routes
            paths:
              - /api/v1/restaurants
              - /api/v1/search
      - name: order-service
        url: http://order-service:8080
        routes:
          - name: order-routes
            paths:
              - /api/orders
      - name: payment-service
        url: http://payment-service:3002
        routes:
          - name: payment-routes
            paths:
              - /api/payments

    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: cors
        config:
          origins:
            - "*"
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  labels:
    app: kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:alpine
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /usr/local/kong/declarative/kong.yml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_LISTEN
              value: "off"
          ports:
            - containerPort: 8000
              name: proxy
          volumeMounts:
            - name: declarative-config
              mountPath: /usr/local/kong/declarative/kong.yml
              subPath: kong.yml
      volumes:
        - name: declarative-config
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
spec:
  selector:
    app: kong
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
